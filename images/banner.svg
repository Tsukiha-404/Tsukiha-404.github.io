<svg width="520" height="120" viewBox="0 0 520 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        *{
          box-sizing:border-box;
          margin:0;
          padding:0;
        }

        .card{
          width:520px;
          height:120px;
          background:#fff;
          border:1px solid #e5e7eb;
          border-radius:18px;
          display:flex;
          align-items:center;
          padding:20px 24px;
          gap:18px;
          font-family:Inter, "Segoe UI", sans-serif;
          animation: float 4s ease-in-out infinite;
          box-shadow:
            0 8px 24px rgba(0,0,0,.06);
        }

        .accent{
          width:8px;
          height:72px;
          border-radius:999px;
          background:linear-gradient(180deg,#7C8CFF,#8BE9FD);
          animation: pulse 3s ease-in-out infinite;
        }

        .content{
          display:flex;
          flex-direction:column;
          justify-content:center;
        }

        .name{
          font-size:30px;
          font-weight:700;
          color:#111827;
          line-height:1.1;
          letter-spacing:.3px;
        }

        .id{
          margin-top:4px;
          color:#9CA3AF;
          font-size:15px;
        }

        .bio{
          margin-top:12px;
          font-size:16px;
          color:#4B5563;
          letter-spacing:.3px;
        }

        @keyframes float{
          0%,100%{
            transform:translateY(0px);
          }
          50%{
            transform:translateY(-4px);
          }
        }

        @keyframes pulse{
          0%,100%{
            transform:scaleY(1);
            opacity:.9;
          }
          50%{
            transform:scaleY(.85);
            opacity:1;
          }
        }
      </style>

      <div class="card">
        <div class="accent"></div>

        <div class="content">
          <div class="name">葉月</div>
          <div class="id">@Tsukiha_404</div>
          <div class="bio">Engineer / Student / AI</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
